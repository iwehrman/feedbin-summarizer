<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedbin Summarizer Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="header-brand">
          <svg viewBox="0 0 14 16" class="header-icon" aria-hidden="true">
            <path
              fill="currentColor"
              fill-rule="evenodd"
              d="M11 0a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3V3a3 3 0 0 1 3-3zM3.5 7.25a.75.75 0 0 0 0 1.5h5.25a.75.75 0 0 0 0-1.5zm0-3a.75.75 0 0 0 0 1.5H7v-1.5zm5 1.5h2a.75.75 0 0 0 0-1.5h-2z"
            />
          </svg>
          <h1>Feedbin Summarizer</h1>
        </div>
      </header>

      <section class="panel">
        <form id="settings-form" class="settings-form">
          <section class="settings-group">
            <h2>Provider</h2>

            <div class="provider-grid">
              <section class="provider-card" data-provider-card="openai">
                <header class="provider-card-header">
                  <div>
                    <h3>OpenAI</h3>
                  </div>
                  <label class="provider-pill provider-card-pill">
                    <input type="radio" name="provider" value="openai">
                    <span data-provider-label="openai">Active</span>
                  </label>
                </header>

                <label class="field">
                  <span>API Key</span>
                  <input type="password" name="openaiApiKey" id="openaiApiKey" autocomplete="off" placeholder="sk-...">
                  <span id="openai-key-status" class="status provider-key-status" role="status" aria-live="polite"></span>
                </label>

                <div class="actions key-actions">
                  <button type="button" class="secondary" data-provider="openai" data-provider-action="save-key">Update</button>
                  <button type="button" class="secondary danger" data-provider="openai" data-provider-action="clear-key">Clear</button>
                  <button type="button" class="secondary" data-provider="openai" data-provider-action="test">Test</button>
                  <span id="openai-test-indicator" class="test-indicator" aria-live="polite"></span>
                </div>

                <label class="field">
                  <span>Model</span>
                  <select name="openaiModel" id="openaiModel">
                    <option value="gpt-5.4-nano">GPT-5.4 Nano</option>
                    <option value="gpt-5.4-mini">GPT-5.4 Mini</option>
                    <option value="gpt-5.4">GPT-5.4</option>
                  </select>
                </label>

                <div class="grid-two">
                  <label class="field">
                    <span>Reasoning Effort</span>
                    <select name="openaiReasoningEffort" id="openaiReasoningEffort">
                      <option value="none">None</option>
                      <option value="low">Low</option>
                      <option value="medium">Medium</option>
                      <option value="high">High</option>
                      <option value="xhigh">XHigh</option>
                    </select>
                  </label>

                  <label class="field">
                    <span>Verbosity</span>
                    <select name="openaiVerbosity" id="openaiVerbosity">
                      <option value="low">Low</option>
                      <option value="medium">Medium</option>
                      <option value="high">High</option>
                    </select>
                  </label>
                </div>
              </section>

              <section class="provider-card" data-provider-card="anthropic">
                <header class="provider-card-header">
                  <div>
                    <h3>Anthropic</h3>
                  </div>
                  <label class="provider-pill provider-card-pill">
                    <input type="radio" name="provider" value="anthropic">
                    <span data-provider-label="anthropic">Use</span>
                  </label>
                </header>

                <label class="field">
                  <span>API Key</span>
                  <input type="password" name="anthropicApiKey" id="anthropicApiKey" autocomplete="off" placeholder="sk-ant-...">
                  <span id="anthropic-key-status" class="status provider-key-status" role="status" aria-live="polite"></span>
                </label>

                <div class="actions key-actions">
                  <button type="button" class="secondary" data-provider="anthropic" data-provider-action="save-key">Update</button>
                  <button type="button" class="secondary danger" data-provider="anthropic" data-provider-action="clear-key">Clear</button>
                  <button type="button" class="secondary" data-provider="anthropic" data-provider-action="test">Test</button>
                  <span id="anthropic-test-indicator" class="test-indicator" aria-live="polite"></span>
                </div>

                <label class="field">
                  <span>Model</span>
                  <select name="anthropicModel" id="anthropicModel">
                    <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
                    <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                  </select>
                </label>
              </section>
            </div>
          </section>

          <section class="settings-group">
            <h2>Instructions</h2>
            <label class="field">
              <textarea name="systemPrompt" id="systemPrompt" rows="4"></textarea>
            </label>
          </section>

          <section class="settings-group">
            <h2>Extension Settings</h2>
            <label class="field checkbox-field">
              <span class="checkbox-row">
                <input type="checkbox" name="summaryCacheEnabled" id="summaryCacheEnabled">
                <span>Cache Summaries</span>
              </span>
              <small class="hint">When enabled, summaries are reused for 7 days.</small>
            </label>

            <label class="field checkbox-field">
              <span class="checkbox-row">
                <input type="checkbox" name="prefetchDebugVisualizationEnabled" id="prefetchDebugVisualizationEnabled">
                <span>Show Summary Indicators</span>
              </span>
              <small class="hint">When enabled, feeds and articles with summaries are badged.</small>
            </label>
          </section>

          <span id="status" class="status" role="status" aria-live="polite"></span>
        </form>
      </section>
    </main>

    <div id="confirm-modal" class="modal-backdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
        <h2 id="confirm-title">Clear API Key?</h2>
        <p id="confirm-message"></p>
        <div class="actions modal-actions">
          <button type="button" id="confirm-cancel" class="secondary">Cancel</button>
          <button type="button" id="confirm-submit" class="secondary danger">Clear</button>
        </div>
      </div>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
