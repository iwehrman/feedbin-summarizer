<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedbin Summarizer Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Feedbin Summarizer</h1>
      </header>

      <section class="panel">
        <form id="settings-form" class="settings-form">
          <section class="settings-group">
            <h2>OpenAI</h2>

            <label class="field">
              <span>API key</span>
              <input type="password" name="openaiApiKey" id="openaiApiKey" autocomplete="off" placeholder="sk-...">
              <small class="hint">Stored locally inside the extension. The saved key is never shown back in full, and this remains less secure than using a backend.</small>
            </label>

            <div class="actions key-actions">
              <button type="button" id="save-key-button" class="secondary">Save key</button>
              <button type="button" id="clear-key-button" class="secondary danger">Clear key</button>
              <button type="button" id="test-button" class="secondary">Test API</button>
            </div>
            <span id="key-status" class="status" role="status" aria-live="polite"></span>

            <label class="field">
              <span>Model</span>
              <input type="text" name="openaiModel" id="openaiModel" autocomplete="off" placeholder="gpt-4.1-mini">
            </label>

            <div class="grid-two">
              <label class="field">
                <span>Reasoning effort</span>
                <select name="openaiReasoningEffort" id="openaiReasoningEffort">
                  <option value="">Model default</option>
                  <option value="minimal">Minimal</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
                <small class="hint">Primarily relevant for GPT-5 reasoning models.</small>
              </label>

              <label class="field">
                <span>Verbosity</span>
                <select name="openaiVerbosity" id="openaiVerbosity">
                  <option value="">Model default</option>
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
                <small class="hint">Lower verbosity usually shortens responses.</small>
              </label>
            </div>

            <label class="field checkbox-field">
              <span class="checkbox-row">
                <input type="checkbox" name="summaryCacheEnabled" id="summaryCacheEnabled">
                <span>Enable summary cache</span>
              </span>
              <small class="hint">When enabled, matching summaries can be reused locally for about 36 hours.</small>
            </label>

            <label class="field checkbox-field">
              <span class="checkbox-row">
                <input type="checkbox" name="prefetchDebugVisualizationEnabled" id="prefetchDebugVisualizationEnabled">
                <span>Show prefetch debug indicators</span>
              </span>
              <small class="hint">Adds tiny feed/article dots to show prefetch eligibility, active fetches, and cached summaries.</small>
            </label>
          </section>

          <section class="settings-group">
            <h2>Summarization</h2>

            <label class="field">
              <span>Summarization instructions</span>
              <textarea name="systemPrompt" id="systemPrompt" rows="6"></textarea>
              <small class="hint">These shape the summary style and priorities. The article request already includes a built-in “Summarize this article” task line.</small>
            </label>
          </section>

          <span id="status" class="status" role="status" aria-live="polite"></span>
        </form>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
